<!-- backend/templates/admin/users.html -->

{% extends "admin/base.html" %}

{% block title %}Kullanıcı Yönetimi{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-people"></i> Kullanıcı Yönetimi</h2>
    <button class="btn btn-primary" onclick="exportUsers()">
        <i class="bi bi-download"></i> Excel'e Aktar
    </button>
</div>

<!-- Filters -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row">
            <div class="col-md-4">
                <input type="text" class="form-control" id="searchInput"
                       placeholder="İsim, email, üniversite ara...">
            </div>
            <div class="col-md-3">
                <select class="form-select" id="testFilter">
                    <option value="all">Tümü</option>
                    <option value="completed">Testi Tamamlayanlar</option>
                    <option value="not_completed">Testi Tamamlamayanlar</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="statusFilter">
                    <option value="all">Tümü</option>
                    <option value="active">Aktif</option>
                    <option value="inactive">Pasif</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-primary w-100" onclick="applyFilters()">
                    <i class="bi bi-filter"></i> Filtrele
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Users Table -->
<div class="card">
    <div class="card-body">
        <table id="usersTable" class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>İsim</th>
                    <th>Email</th>
                    <th>Üniversite</th>
                    <th>Bölüm</th>
                    <th>Kişilik Tipi</th>
                    <th>Hobiler</th>
                    <th>Topluluklar</th>
                    <th>Mesajlar</th>
                    <th>Durum</th>
                    <th>Kayıt Tarihi</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody>
                <!-- DataTable will populate here -->
            </tbody>
        </table>
    </div>
</div>

<!-- User Detail Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Kullanıcı Detayı</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="userModalBody">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Kapat</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Kaydet</button>
            </div>
        </div>
    </div>
</div>

<script>
let usersTable;

$(document).ready(function() {
    initUsersTable();
});

function initUsersTable() {
    usersTable = $('#usersTable').DataTable({
        processing: true,
        serverSide: true,
        ajax: {
            url: '/admin/api/users',
            data: function(d) {
                d.search = $('#searchInput').val();
                d.test_filter = $('#testFilter').val();
                d.status_filter = $('#statusFilter').val();
            }
        },
        columns: [
            { data: 'id' },
            { data: 'name' },
            { data: 'email' },
            { data: 'university' },
            { data: 'department' },
            {
                data: 'personality_type',
                render: function(data) {
                    return data || '<span class="text-muted">-</span>';
                }
            },
            {
                data: 'hobbies_list',
                render: function(data) {
                    if (!data || data.length === 0) return '<span class="text-muted">-</span>';
                    return data.slice(0, 3).join(', ') + (data.length > 3 ? '...' : '');
                }
            },
            { data: 'communities_count' },
            { data: 'messages_count' },
            {
                data: 'is_active',
                render: function(data) {
                    return data ?
                        '<span class="badge bg-success">Aktif</span>' :
                        '<span class="badge bg-danger">Pasif</span>';
                }
            },
            {
                data: 'created_at',
                render: function(data) {
                    return new Date(data).toLocaleDateString('tr-TR');
                }
            },
            {
                data: null,
                render: function(data) {
                    return `
                        <button class="btn btn-sm btn-info" onclick="viewUser(${data.id})">
                            <i class="bi bi-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-warning" onclick="editUser(${data.id})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${data.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    `;
                }
            }
        ],
        order: [[10, 'desc']],
        language: {
            url: '//cdn.datatables.net/plug-ins/1.11.5/i18n/tr.json'
        }
    });
}

function applyFilters() {
    usersTable.ajax.reload();
}

function viewUser(userId) {
    $.get(`/admin/api/users/${userId}`, function(response) {
        if (response.success) {
            const user = response.user;

            let html = `
                <div class="row">
                    <div class="col-md-6">
                        <h6>Temel Bilgiler</h6>
                        <table class="table table-sm">
                            <tr><th>İsim:</th><td>${user.name}</td></tr>
                            <tr><th>Email:</th><td>${user.email}</td></tr>
                            <tr><th>Üniversite:</th><td>${user.university || '-'}</td></tr>
                            <tr><th>Bölüm:</th><td>${user.department || '-'}</td></tr>
                            <tr><th>Sınıf:</th><td>${user.year || '-'}</td></tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h6>Test Sonuçları</h6>
                        <table class="table table-sm">
                            <tr><th>Kişilik Tipi:</th><td>${user.personality_type || '-'}</td></tr>
                            <tr><th>Hobiler:</th><td>${user.hobbies_list?.join(', ') || '-'}</td></tr>
                        </table>
                    </div>
                </div>

                <h6 class="mt-3">Üye Olduğu Topluluklar</h6>
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Topluluk</th>
                            <th>Rol</th>
                            <th>Katılma Tarihi</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            if (user.communities && user.communities.length > 0) {
                user.communities.forEach(c => {
                    html += `
                        <tr>
                            <td>${c.name}</td>
                            <td>${c.role}</td>
                            <td>${new Date(c.joined_at).toLocaleDateString('tr-TR')}</td>
                        </tr>
                    `;
                });
            } else {
                html += '<tr><td colspan="3" class="text-center">Hiç topluluğa üye değil</td></tr>';
            }

            html += `
                    </tbody>
                </table>

                <h6 class="mt-3">İstatistikler</h6>
                <div class="row">
                    <div class="col-4 text-center">
                        <div class="border rounded p-2">
                            <h4>${user.statistics.total_messages}</h4>
                            <small>Toplam Mesaj</small>
                        </div>
                    </div>
                    <div class="col-4 text-center">
                        <div class="border rounded p-2">
                            <h4>${user.statistics.communities_count}</h4>
                            <small>Aktif Topluluk</small>
                        </div>
                    </div>
                    <div class="col-4 text-center">
                        <div class="border rounded p-2">
                            <h4>${new Date(user.statistics.last_active).toLocaleDateString('tr-TR')}</h4>
                            <small>Son Aktivite</small>
                        </div>
                    </div>
                </div>
            `;

            $('#userModalBody').html(html);
            $('#userModal').modal('show');
        }
    });
}

function editUser(userId) {
    // Edit user implementation
}

function deleteUser(userId) {
    Swal.fire({
        title: 'Emin misiniz?',
        text: "Bu kullanıcı kalıcı olarak silinecek!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Evet, sil!',
        cancelButtonText: 'İptal'
    }).then((result) => {
        if (result.isConfirmed) {
            $.ajax({
                url: `/admin/api/users/${userId}`,
                method: 'DELETE',
                success: function(response) {
                    if (response.success) {
                        Swal.fire('Silindi!', 'Kullanıcı başarıyla silindi.', 'success');
                        usersTable.ajax.reload();
                    }
                },
                error: function() {
                    Swal.fire('Hata!', 'Kullanıcı silinirken bir hata oluştu.', 'error');
                }
            });
        }
    });
}

function exportUsers() {
    window.location.href = '/admin/api/users/export';
}
</script>
{% endblock %}
