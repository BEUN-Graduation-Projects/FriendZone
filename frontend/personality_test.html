<!-- frontend/personality_test.html -->

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişilik Testi - FriendZone</title>

    <!-- CSS DOSYALARI -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/test.css">

    <!-- Font Awesome ve Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="test-container">
                <div class="test-header">
                    <h1>Kişilik Testi</h1>
                    <p>25 soru ile MBTI kişilik tipini keşfet ve en uygun topluluklarla eşleş</p>
                    <div class="test-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text">
                            <span id="currentQuestion">1</span> / <span id="totalQuestions">25</span>
                        </div>
                    </div>
                </div>

                <div class="test-content">
                    <div id="testQuestions"></div>

                    <div class="test-navigation">
                        <button class="btn btn-secondary" id="prevBtn" disabled>
                            <i class="fas fa-arrow-left"></i> Önceki
                        </button>
                        <button class="btn btn-primary" id="nextBtn">
                            Sonraki <i class="fas fa-arrow-right"></i>
                        </button>
                        <button class="btn btn-success" id="submitBtn" style="display: none;">
                            <i class="fas fa-paper-plane"></i> Testi Tamamla
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript dosyaları -->
    <script src="js/sidebar.js"></script>
    <script src="js/personalityTest.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Sidebar'ı yükle
        fetch('sidebar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('sidebar-container').innerHTML = html;
                if (window.sidebarManager) {
                    window.sidebarManager.init();
                }
            });
    </script>
</body>
</html>
