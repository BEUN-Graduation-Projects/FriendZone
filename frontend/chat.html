<!-- frontend/chat.html -->

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendZone - Sohbet</title>

    <!-- Socket.IO Client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <!-- Sol Sidebar - Topluluk Bilgileri ve Online Üyeler -->
        <div class="chat-sidebar">
            <div class="community-info">
                <h2 id="community-name">Yükleniyor...</h2>
                <p id="community-description" class="community-description"></p>

                <div class="community-stats">
                    <div class="stat-item">
                        <i class="fas fa-users"></i>
                        <span id="total-members">0</span> Üye
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-circle" style="color: #4CAF50;"></i>
                        <span id="online-count">0</span> Çevrimiçi
                    </div>
                </div>
            </div>

            <div class="online-users-section">
                <h3>
                    <i class="fas fa-circle" style="color: #4CAF50; font-size: 12px;"></i>
                    Çevrimiçi Kullanıcılar
                </h3>
                <div id="online-users" class="online-users-list">
                    <!-- Online kullanıcılar burada listelenecek -->
                </div>
            </div>

            <div class="chat-actions">
                <button onclick="leaveCommunity()" class="btn-leave">
                    <i class="fas fa-sign-out-alt"></i> Topluluktan Ayrıl
                </button>
            </div>
        </div>

        <!-- Ana Sohbet Alanı -->
        <div class="chat-main">
            <!-- Sohbet Başlığı -->
            <div class="chat-header">
                <div class="chat-header-info">
                    <i class="fas fa-comments"></i>
                    <span id="room-name">Sohbet Odası</span>
                </div>
                <div class="chat-header-actions">
                    <button onclick="toggleSettings()" class="btn-icon" title="Ayarlar">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>

            <!-- Mesajlar -->
            <div id="chat-messages" class="chat-messages">
                <!-- Mesajlar burada listelenecek -->
                <div class="message-loading">
                    <i class="fas fa-spinner fa-spin"></i> Mesajlar yükleniyor...
                </div>
            </div>

            <!-- Yazıyor Göstergesi -->
            <div id="typing-indicator" class="typing-indicator" style="display: none;">
                <i class="fas fa-pencil-alt"></i> <span></span>
            </div>

            <!-- Mesaj Gönderme Alanı -->
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <button onclick="attachFile()" class="btn-attach" title="Dosya Ekle">
                        <i class="fas fa-paperclip"></i>
                    </button>

                    <textarea
                        id="message-input"
                        class="chat-input"
                        placeholder="Mesajınızı yazın..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        onkeyup="handleKeyUp(event)"
                        oninput="autoResize(this)"
                    ></textarea>

                    <button onclick="sendMessage()" class="btn-send" id="send-button" title="Gönder">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>

                <div class="chat-input-hint">
                    <i class="fas fa-info-circle"></i> Enter gönder, Shift+Enter yeni satır
                </div>
            </div>
        </div>
    </div>

    <!-- Ayarlar Modal -->
    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Sohbet Ayarları</h3>
                <button onclick="closeModal()" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-option">
                    <label>
                        <input type="checkbox" id="notification-sound" checked>
                        Bildirim sesi
                    </label>
                </div>
                <div class="settings-option">
                    <label>
                        <input type="checkbox" id="show-typing" checked>
                        Yazıyor göstergesini göster
                    </label>
                </div>
                <div class="settings-option">
                    <label>
                        <input type="checkbox" id="enter-to-send" checked>
                        Enter ile gönder
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Socket.IO Client -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/chatHandler.js"></script>
    <script>
        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', async () => {
            // Kullanıcı bilgilerini al
            const userData = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('token');

            if (!userData || !token) {
                window.location.href = 'login.html';
                return;
            }

            // URL'den community ID'yi al
            const urlParams = new URLSearchParams(window.location.search);
            const communityId = urlParams.get('community_id');

            if (!communityId) {
                showError('Topluluk ID bulunamadı');
                return;
            }

            try {
                // Topluluk bilgilerini yükle
                await loadCommunityInfo(communityId, userData.id, token);

                // Sohbet geçmişini yükle
                await loadChatHistory(communityId, token);

                // Socket.IO bağlantısını başlat
                chatHandler.init(userData);

                // Sohbet odasına katıl
                chatHandler.joinRoom(communityId);

            } catch (error) {
                console.error('Sohbet yüklenirken hata:', error);
                showError('Sohbet yüklenemedi');
            }
        });

        // Topluluk bilgilerini yükle
        async function loadCommunityInfo(communityId, userId, token) {
            const response = await fetch(`/api/community/${communityId}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) throw new Error('Topluluk bilgileri alınamadı');

            const data = await response.json();
            const community = data.community;

            document.getElementById('community-name').textContent = community.name;
            document.getElementById('community-description').textContent = community.description;
            document.getElementById('total-members').textContent = community.current_member_count;
        }

        // Sohbet geçmişini yükle
        async function loadChatHistory(communityId, token) {
            const response = await fetch(`/api/chat/${communityId}/messages`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) throw new Error('Sohbet geçmişi alınamadı');

            const data = await response.json();
            const messagesContainer = document.getElementById('chat-messages');

            messagesContainer.innerHTML = '';

            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(message => {
                    chatHandler.displayMessage(message);
                });
            } else {
                messagesContainer.innerHTML = '<div class="no-messages">Henüz mesaj yok. İlk mesajı siz yazın! 👋</div>';
            }
        }

        // Mesaj gönder
        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();

            if (message) {
                chatHandler.sendMessage(message);
            }
        }

        // Enter tuşu kontrolü
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                const enterToSend = document.getElementById('enter-to-send')?.checked ?? true;

                if (enterToSend) {
                    event.preventDefault();
                    sendMessage();
                }
            }
        }

        // KeyUp olayı - yazıyor bildirimi
        let typingTimer;
        function handleKeyUp(event) {
            const input = event.target;

            // Yazıyor bildirimi gönder
            chatHandler.sendTyping(input.value.length > 0);

            // 2 saniye sonra yazıyor durumunu kaldır
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                chatHandler.sendTyping(false);
            }, 2000);
        }

        // Textarea otomatik boyutlandırma
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        // Dosya ekle
        function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,.pdf,.doc,.docx';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    uploadFile(file);
                }
            };
            input.click();
        }

        // Dosya yükle
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/chat/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    chatHandler.sendMessage(data.fileUrl, 'file');
                }
            } catch (error) {
                console.error('Dosya yükleme hatası:', error);
                chatHandler.showNotification('Dosya yüklenemedi', 'error');
            }
        }

        // Topluluktan ayrıl
        async function leaveCommunity() {
            if (!confirm('Topluluktan ayrılmak istediğinize emin misiniz?')) return;

            const urlParams = new URLSearchParams(window.location.search);
            const communityId = urlParams.get('community_id');
            const userData = JSON.parse(localStorage.getItem('user'));

            try {
                const response = await fetch('/api/community/leave', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        user_id: userData.id,
                        community_id: parseInt(communityId)
                    })
                });

                if (response.ok) {
                    chatHandler.disconnect();
                    window.location.href = 'communities.html';
                }
            } catch (error) {
                console.error('Ayrılma hatası:', error);
                chatHandler.showNotification('Topluluktan ayrılamadı', 'error');
            }
        }

        // Modal işlemleri
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        // Hata göster
        function showError(message) {
            const container = document.querySelector('.chat-main');
            container.innerHTML = `
                <div class="error-container">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>${message}</p>
                    <button onclick="window.location.href='communities.html'" class="btn-primary">
                        Topluluklara Dön
                    </button>
                </div>
            `;
        }

        // Modal dışına tıklandığında kapat
        window.onclick = function(event) {
            const modal = document.getElementById('settings-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
